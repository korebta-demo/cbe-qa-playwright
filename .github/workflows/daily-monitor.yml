name: Daily QA Monitor – CBE Public Website

on:
  # ── Runs every day at 06:00 UTC = 09:00 Addis Ababa (EAT) ──
  schedule:
    - cron: '0 6 * * *'

  # ── Trigger manually from the GitHub Actions tab ──
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - availability
          - journeys
          - visual

jobs:
  playwright-tests:
    name: Run QA Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Enable Yarn 1 (Classic)
        run: corepack enable && corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium

      - name: Create results directory
        run: mkdir -p results screenshots

      - name: Run Playwright tests
        id: run-tests
        run: |
          case "${{ github.event.inputs.suite }}" in
            availability) npx playwright test tests/01-availability.spec.ts ;;
            journeys)     npx playwright test tests/02-navigation.spec.ts ;;
            visual)       npx playwright test tests/03-visual.spec.ts ;;
            *)            npx playwright test ;;
          esac
        continue-on-error: true

      - name: Generate report summary
        if: always()
        env:
          SUITE_LABEL: ${{ github.event.inputs.suite || 'all' }}
        run: node scripts/ci-report-summary.js

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 30

      - name: Send email with results
        if: always() && secrets.MAIL_TO != ''
        continue-on-error: true
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT || '587' }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          secure: ${{ secrets.SMTP_SECURE != 'false' }}
          subject: "Playwright QA ${{ job.status == 'success' && steps.run-tests.outcome == 'success' && '✅ Passed' || '❌ Failed' }} – CBE (${{ github.event.inputs.suite || 'all' }})"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM || secrets.SMTP_USERNAME }}
          html_body: file://results/email-body.html

      # GitHub automatically emails you when this step fails
      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "❌ Tests failed. Check the playwright-report artifact for details."
          exit 1