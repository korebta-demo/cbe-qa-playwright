name: Daily QA Monitor

on:
  # ── Scheduled: runs every day at 06:00 UTC (08:00 Addis Ababa time) ──
  schedule:
    - cron: '0 6 * * *'

  # ── Manual trigger from GitHub UI ──
  workflow_dispatch:
    inputs:
      suite:
        description: 'Which test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - availability
          - navigation
          - visual

jobs:
  playwright-tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Check out the repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # 5. Run the tests
      - name: Run Playwright tests
        id: run-tests
        run: |
          if [ "${{ github.event.inputs.suite }}" = "availability" ]; then
            npx playwright test tests/01-availability.spec.ts
          elif [ "${{ github.event.inputs.suite }}" = "navigation" ]; then
            npx playwright test tests/02-navigation.spec.ts
          elif [ "${{ github.event.inputs.suite }}" = "visual" ]; then
            npx playwright test tests/03-visual.spec.ts
          else
            npx playwright test
          fi
        continue-on-error: true   # don't stop — we want reports even on failure

      # 6. Upload the HTML report as a downloadable artifact
      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      # 7. Upload screenshots
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 30

      # 8. Upload JUnit XML (for GitHub test summary)
      - name: Upload JUnit Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-results-${{ github.run_number }}
          path: results/junit.xml
          retention-days: 30

      # 9. Publish test results as a GitHub check summary
      - name: Publish Test Summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Results
          path: results/junit.xml
          reporter: java-junit
          fail-on-error: false

      # 10. Fail the job if tests failed (after reports are saved)
      - name: Check test result
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "❌ One or more Playwright tests failed. Check the report artifact."
          exit 1

  # ── Optional: Slack notification on failure ──
  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: playwright-tests
    if: failure()
    steps:
      - name: Send Slack notification
        # Only runs if SLACK_WEBHOOK_URL secret is set in the repo
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *CBE QA Monitor — Test Failure*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Daily Playwright tests failed*\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Report>\n*Branch:* `${{ github.ref_name }}`\n*Time:* ${{ github.event.head_commit.timestamp }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
